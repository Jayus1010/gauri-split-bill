<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gauri — Split Bill AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        .step-in { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900 leading-relaxed">

    <!-- HEADER -->
    <header class="glass sticky top-0 z-50 border-b border-slate-100 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 btn-gradient rounded-2xl flex items-center justify-center text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></svg>
            </div>
            <div>
                <h1 class="font-extrabold text-xl tracking-tight">Gauri</h1>
                <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest leading-none">AI Splitter</p>
            </div>
        </div>
        <button onclick="location.reload()" class="p-2 text-slate-400 hover:text-indigo-600 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
    </header>

    <main class="max-w-md mx-auto p-6 pb-32">
        
        <!-- STEP 1: WELCOME -->
        <div id="step-1" class="step-in space-y-8 py-4">
            <div class="space-y-2">
                <h2 class="text-4xl font-extrabold text-slate-900">Hitung struk <br><span class="text-indigo-600">gak pake ribet.</span></h2>
                <p class="text-slate-500 font-medium">Foto struknya, biar Gauri yang urus.</p>
            </div>

            <div class="grid gap-4">
                <label class="group bg-white p-8 rounded-[2.5rem] border border-slate-100 card-shadow flex flex-col items-center text-center space-y-4 active:scale-95 transition-all cursor-pointer">
                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="handleFile(this)">
                    <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center group-hover:btn-gradient group-hover:text-white transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    </div>
                    <div>
                        <span class="block font-bold text-lg">Ambil Foto Struk</span>
                        <span class="text-xs text-slate-400 font-medium">Buka kamera otomatis</span>
                    </div>
                </label>

                <div class="flex gap-4">
                    <label class="flex-1 bg-white p-6 rounded-[2rem] border border-slate-100 card-shadow flex flex-col items-center text-center space-y-3 active:scale-95 transition-all cursor-pointer">
                        <input type="file" accept="image/*" class="hidden" onchange="handleFile(this)">
                        <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        </div>
                        <span class="font-bold text-xs">Pilih Galeri</span>
                    </label>

                    <button onclick="startManual()" class="flex-1 bg-white p-6 rounded-[2rem] border border-slate-100 card-shadow flex flex-col items-center text-center space-y-3 active:scale-95 transition-all">
                        <div class="w-12 h-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </div>
                        <span class="font-bold text-xs tracking-tight">Input Manual</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- STEP 2: REVIEW -->
        <div id="step-2" class="hidden step-in space-y-6">
            <div class="flex justify-between items-end px-2">
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-900">Review Menu</h2>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Step 1 dari 3</p>
                </div>
                <button onclick="addItem()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg shadow-indigo-100">TAMBAH</button>
            </div>

            <div id="items-list" class="space-y-4"></div>

            <div class="bg-slate-900 rounded-[2rem] p-6 text-white card-shadow flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-indigo-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
                    </div>
                    <span class="font-bold text-sm">Pajak (PPN/Svc)</span>
                </div>
                <div class="text-right">
                    <span class="text-[9px] font-black opacity-50 block mb-1">JUMLAH PAJAK</span>
                    <input type="number" id="tax-input" class="w-24 bg-transparent text-right font-black text-lg outline-none border-b border-white/20" value="0">
                </div>
            </div>

            <button onclick="goToStep(3)" class="btn-gradient w-full text-white py-5 rounded-[1.8rem] font-extrabold text-lg shadow-xl shadow-indigo-100 active:scale-95 transition-all">Lanjut Pilih Orang →</button>
        </div>

        <!-- STEP 3: PEOPLE -->
        <div id="step-3" class="hidden step-in space-y-6">
            <h2 class="text-2xl font-extrabold px-2">Siapa Makan?</h2>
            <div class="relative">
                <input type="text" id="person-input" placeholder="Ketik nama teman..." class="w-full bg-white border border-slate-100 rounded-[1.5rem] px-6 py-5 shadow-sm font-bold text-slate-800 outline-none focus:border-indigo-600">
                <button onclick="addPerson()" class="absolute right-3 top-3 w-10 h-10 btn-gradient text-white rounded-xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
            <div id="people-chips" class="flex flex-wrap gap-2 px-1"></div>
            <div id="assign-container" class="space-y-4 pt-2"></div>
            
            <div class="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-100 z-50">
                <button onclick="goToStep(4)" class="btn-gradient w-full max-w-md mx-auto text-white py-5 rounded-[1.8rem] font-extrabold text-lg active:scale-95 transition-all">Selesai & Hitung →</button>
            </div>
        </div>

        <!-- STEP 4: RESULT -->
        <div id="step-4" class="hidden step-in space-y-6">
            <div class="btn-gradient rounded-[2.5rem] p-8 text-white text-center shadow-2xl relative overflow-hidden">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-80">Total Tagihan</p>
                <h3 id="grand-total-text" class="text-4xl font-black mt-1">Rp 0</h3>
                <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            </div>
            <div id="summary-list" class="space-y-4"></div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="downloadPDF()" class="bg-white border border-slate-100 p-5 rounded-[1.8rem] font-extrabold text-xs shadow-sm active:scale-95 transition-all">UNDUH PDF</button>
                <button onclick="location.reload()" class="bg-indigo-50 p-5 rounded-[1.8rem] font-extrabold text-xs text-indigo-600 active:scale-95 transition-all">ULANGI</button>
            </div>
        </div>

    </main>

    <!-- LOADER -->
    <div id="loader" class="hidden fixed inset-0 glass z-[60] flex flex-col items-center justify-center p-10 text-center">
        <div class="relative mb-8">
            <div class="w-20 h-20 border-4 border-slate-100 rounded-3xl animate-spin shadow-xl"></div>
            <div class="w-10 h-10 btn-gradient absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-xl flex items-center justify-center text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="animate-pulse"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
        </div>
        <h3 class="text-2xl font-extrabold text-slate-800">Gauri Sedang Membaca...</h3>
        <p class="text-slate-400 text-sm mt-2 font-medium">Beri waktu 5-10 detik untuk AI mengenali menu struk kamu.</p>
    </div>

    <script>
        const apiKey = "AIzaSyBUCxSsZau7u16hxl_0_3DpN3-y0Gf24I0";
        let items = []; let people = []; let assignments = {}; let tax = 0;

        async function handleFile(input) {
            const file = input.files[0]; if (!file) return;
            document.getElementById('loader').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                try {
                    const res = await callAI(base64);
                    items = res.items.map(it => {
                        // Logic: Jika AI memberikan total, kita hitung unit price-nya
                        const rawPrice = it.price;
                        const qty = it.qty || 1;
                        // Biasanya AI memberikan total line price, kita simpan sebagai unit price untuk split
                        return { ...it, price: Math.round(rawPrice / qty), id: Math.random().toString(36).substr(2, 9) };
                    });
                    tax = res.totalTax || 0;
                    renderStep2(); goToStep(2);
                } catch (err) {
                    alert("Waduh, Gauri kesulitan baca struk ini. Pastikan foto terang atau gunakan Input Manual.");
                } finally { document.getElementById('loader').classList.add('hidden'); }
            };
            reader.readAsDataURL(file);
        }

        async function callAI(base64) {
            const prompt = `Analisis struk ini. Ekstrak menu, jumlah (qty), dan harga TOTAL per baris. Kembalikan HANYA JSON: { "items": [{"name":"Menu", "price": 100000, "qty": 2}], "totalTax": 5000 }. Hapus semua titik/koma dari angka.`;
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await response.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        function startManual() { items = []; renderStep2(); goToStep(2); }

        function addItem() {
            items.push({ id: Math.random().toString(36).substr(2, 9), name: "Menu Baru", price: 0, qty: 1 });
            renderStep2();
        }

        function renderStep2() {
            const list = document.getElementById('items-list');
            list.innerHTML = items.map((it, i) => `
                <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-50 space-y-4 animate-up">
                    <div class="flex justify-between items-start gap-3">
                        <div class="flex-1">
                            <input type="text" value="${it.name}" onchange="items[${i}].name=this.value" class="font-extrabold text-slate-800 text-lg w-full bg-transparent focus:text-indigo-600 outline-none">
                            <div class="flex gap-2 mt-2">
                                <div class="bg-slate-50 px-3 py-2 rounded-xl flex gap-2 items-center">
                                    <span class="text-[9px] font-black text-slate-300">QTY</span>
                                    <input type="number" value="${it.qty}" onchange="items[${i}].qty=parseInt(this.value); renderStep2();" class="w-8 text-center bg-transparent font-bold">
                                </div>
                                <div class="bg-slate-50 px-3 py-2 rounded-xl flex gap-2 items-center">
                                    <span class="text-[9px] font-black text-slate-300">@ RP</span>
                                    <input type="number" value="${it.price}" onchange="items[${i}].price=parseInt(this.value); renderStep2();" class="w-20 bg-transparent font-bold">
                                </div>
                            </div>
                        </div>
                        <button onclick="items.splice(${i},1); renderStep2();" class="w-10 h-10 text-red-200 hover:text-red-500 transition-colors">×</button>
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-slate-50">
                        <span class="text-[9px] font-black text-slate-300 uppercase">SUBTOTAL MENU</span>
                        <span class="font-black text-indigo-600">Rp ${(it.price * it.qty).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('tax-input').value = tax;
        }

        function goToStep(n) {
            [1, 2, 3, 4].forEach(s => document.getElementById(`step-${s}`).classList.add('hidden'));
            document.getElementById(`step-${n}`).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (n === 3) renderAssign();
            if (n === 4) renderSummary();
        }

        function addPerson() {
            const input = document.getElementById('person-input');
            const name = input.value.trim();
            if (name) {
                people.push({ id: Date.now().toString(), name });
                input.value = ''; renderNames(); renderAssign();
            }
        }

        function renderNames() {
            const cont = document.getElementById('people-chips');
            cont.innerHTML = people.map(p => `
                <div class="bg-white border border-slate-100 pl-4 pr-2 py-2 rounded-2xl text-xs font-black flex items-center gap-3 shadow-sm">
                    <span>${p.name}</span>
                    <button onclick="people=people.filter(x=>x.id!=='${p.id}'); renderNames(); renderAssign();" class="w-6 h-6 bg-slate-50 rounded-lg text-slate-300 hover:text-red-500 transition-all">×</button>
                </div>
            `).join('');
        }

        function updateQty(itId, pId, delta) {
            if (!assignments[itId]) assignments[itId] = {};
            const cur = assignments[itId][pId] || 0;
            assignments[itId][pId] = Math.max(0, cur + delta);
            renderAssign();
        }

        function renderAssign() {
            const cont = document.getElementById('assign-container');
            if (people.length === 0) { cont.innerHTML = `<div class="py-16 text-center text-slate-300 italic font-bold">Tambah nama teman di atas!</div>`; return; }
            cont.innerHTML = items.map(it => `
                <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-50 space-y-4">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-3">
                        <span class="font-extrabold text-sm">${it.name} (x${it.qty})</span>
                        <span class="font-black text-indigo-600 text-xs">@ Rp ${it.price.toLocaleString()}</span>
                    </div>
                    <div class="space-y-2">
                        ${people.map(p => {
                            const q = assignments[it.id]?.[p.id] || 0;
                            return `
                                <div class="flex justify-between items-center p-3 rounded-2xl ${q > 0 ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'} transition-all">
                                    <span class="text-xs font-bold ml-2">${p.name}</span>
                                    <div class="flex items-center gap-4">
                                        <button onclick="updateQty('${it.id}', '${p.id}', -1)" class="w-8 h-8 ${q > 0 ? 'bg-white/20' : 'bg-white'} rounded-xl flex items-center justify-center font-bold shadow-sm">-</button>
                                        <span class="text-xs font-black w-4 text-center">${q}</span>
                                        <button onclick="updateQty('${it.id}', '${p.id}', 1)" class="w-8 h-8 ${q > 0 ? 'bg-white/20' : 'bg-white'} rounded-xl flex items-center justify-center font-bold shadow-sm">+</button>
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function calculate() {
            tax = parseInt(document.getElementById('tax-input').value) || 0;
            const sub = items.reduce((a, b) => a + (b.price * b.qty), 0);
            const totals = people.map(p => {
                let pSub = 0;
                items.forEach(it => { const q = assignments[it.id]?.[p.id] || 0; pSub += (it.price * q); });
                const pTax = sub > 0 ? (pSub / sub) * tax : 0;
                return { ...p, sub: pSub, pTax, total: pSub + pTax };
            });
            return { sub, tax, grand: sub + tax, totals };
        }

        function renderSummary() {
            const data = calculate();
            document.getElementById('grand-total-text').innerText = `Rp ${data.grand.toLocaleString()}`;
            document.getElementById('summary-list').innerHTML = data.totals.map(p => `
                <div class="bg-white rounded-[2rem] p-8 border border-slate-50 shadow-sm relative overflow-hidden">
                    <div class="flex justify-between items-start mb-6">
                        <div class="space-y-1">
                            <h4 class="text-2xl font-black text-slate-800">${p.name}</h4>
                            <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">RINGKASAN BILL</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">TOTAL BAYAR</span>
                            <span class="font-black text-2xl text-indigo-600">Rp ${Math.round(p.total).toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${items.filter(it => (assignments[it.id]?.[p.id] || 0) > 0).map(it => `
                            <div class="flex justify-between text-xs text-slate-500 italic">
                                <span>${it.name} (x${assignments[it.id][p.id]})</span>
                                <span class="font-black text-slate-800">Rp ${(it.price * assignments[it.id][p.id]).toLocaleString()}</span>
                            </div>
                        `).join('')}
                        <div class="pt-3 border-t border-slate-50 flex justify-between text-[9px] font-black text-slate-300 uppercase">
                            <span>Bagian Pajak</span>
                            <span>+ Rp ${Math.round(p.pTax).toLocaleString()}</span>
                        </div>
                    </div>
                </div>`).join('');
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const data = calculate();
            doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.text("GAURI BILL REPORT", 14, 25);
            doc.setFontSize(10); doc.setTextColor(150); doc.text(`Laporan: ${new Date().toLocaleString('id-ID')}`, 14, 32);
            doc.setFontSize(12); doc.setTextColor(0); doc.text(`TOTAL TAGIHAN: Rp ${data.grand.toLocaleString()}`, 14, 42);
            let y = 55;
            data.totals.forEach(p => {
                if (y > 240) { doc.addPage(); y = 20; }
                doc.setFontSize(16); doc.setTextColor(79, 70, 229); doc.text(p.name, 14, y);
                const rows = items.filter(it => (assignments[it.id]?.[p.id] || 0) > 0).map(it => [it.name, assignments[it.id][p.id], `Rp ${it.price.toLocaleString()}`, `Rp ${(it.price * assignments[it.id][p.id]).toLocaleString()}`]);
                doc.autoTable({ startY: y + 3, head: [['Item', 'Qty', 'Unit', 'Sub']], body: [...rows, [{ content: 'TOTAL AKHIR', colSpan: 3, styles: { halign: 'right', fontStyle: 'bold' } }, `Rp ${Math.round(p.total).toLocaleString()}`]], theme: 'striped', headStyles: { fillColor: [79, 70, 229] } });
                y = doc.lastAutoTable.finalY + 15;
            });
            doc.save("Gauri_Split_Bill.pdf");
        }
    </script>
</body>
</html>
