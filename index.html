<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gauri — Premium Split Bill AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #fcfdfe; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .card-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.06); }
        .btn-premium { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
        .step-in { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-slate-900 selection:bg-indigo-100">

    <!-- HEADER -->
    <header class="glass sticky top-0 z-50 border-b border-slate-100 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 btn-premium rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></svg>
            </div>
            <div>
                <h1 class="font-extrabold text-xl tracking-tight">Gauri</h1>
                <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest leading-none">Ultra AI 2.5</p>
            </div>
        </div>
        <button onclick="location.reload()" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-300 hover:bg-slate-50 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
    </header>

    <main class="max-w-md mx-auto p-6 pb-32">
        
        <!-- STEP 1: HOME -->
        <div id="step-1" class="step-in space-y-8 py-6">
            <div class="space-y-3">
                <h2 class="text-4xl font-extrabold text-slate-900 leading-tight tracking-tight">Split bill <br><span class="text-indigo-600 underline decoration-indigo-200 underline-offset-8">otomatis.</span></h2>
                <p class="text-slate-500 font-medium">Biar Gauri yang baca struknya buat kamu.</p>
            </div>

            <div class="grid gap-4">
                <label class="group bg-white p-10 rounded-[2.5rem] border border-slate-100 card-shadow flex flex-col items-center text-center space-y-4 active:scale-95 transition-all cursor-pointer">
                    <input type="file" accept="image/*" capture="environment" class="hidden" onchange="handleFile(this)">
                    <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center group-hover:btn-premium group-hover:text-white transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    </div>
                    <div>
                        <span class="block font-bold text-xl text-slate-800">Foto Struk</span>
                        <span class="text-xs text-slate-400 font-medium">Scan struk makan malam ini</span>
                    </div>
                </label>

                <div class="flex gap-4">
                    <label class="flex-1 bg-white p-6 rounded-[2rem] border border-slate-100 card-shadow flex flex-col items-center text-center space-y-2 active:scale-95 transition-all cursor-pointer">
                        <input type="file" accept="image/*" class="hidden" onchange="handleFile(this)">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        </div>
                        <span class="font-bold text-xs">Galeri</span>
                    </label>

                    <button onclick="startManual()" class="flex-1 bg-white p-6 rounded-[2rem] border border-slate-100 card-shadow flex flex-col items-center text-center space-y-2 active:scale-95 transition-all">
                        <div class="w-10 h-10 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </div>
                        <span class="font-bold text-xs">Manual</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- STEP 2: REVIEW -->
        <div id="step-2" class="hidden step-in space-y-6">
            <div class="flex justify-between items-end px-2">
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-900">Hasil Scan AI</h2>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Langkah 1: Review Item</p>
                </div>
                <button onclick="addItem()" class="text-[10px] font-black bg-indigo-600 text-white px-3 py-2 rounded-xl shadow-lg">+ ITEM</button>
            </div>

            <div id="items-list" class="space-y-4"></div>

            <div class="bg-slate-900 rounded-[2.5rem] p-7 text-white card-shadow flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-indigo-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
                    </div>
                    <div>
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pajak / PPN</span>
                        <div class="flex items-center gap-1">
                            <span class="text-xs font-bold">Rp</span>
                            <input type="number" id="tax-input" class="bg-transparent font-black text-xl outline-none border-b border-white/20 w-24" value="0">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="goToStep(3)" class="btn-premium w-full text-white py-5 rounded-[1.8rem] font-extrabold text-lg shadow-xl active:scale-95 transition-all">Pilih Teman →</button>
        </div>

        <!-- STEP 3: PEOPLE -->
        <div id="step-3" class="hidden step-in space-y-6">
            <h2 class="text-2xl font-extrabold px-2 text-slate-900">Bagi-bagi Item</h2>
            <div class="relative">
                <input type="text" id="person-input" placeholder="Siapa yang ikut makan?" class="w-full bg-white border border-slate-100 rounded-[1.5rem] px-6 py-5 shadow-sm font-bold text-slate-800 outline-none focus:border-indigo-600">
                <button onclick="addPerson()" class="absolute right-3 top-3 w-10 h-10 btn-premium text-white rounded-xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
            <div id="people-chips" class="flex flex-wrap gap-2 px-1"></div>
            <div id="assign-container" class="space-y-4 pt-2"></div>
            
            <div class="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-50 z-50">
                <button onclick="goToStep(4)" class="btn-premium w-full max-w-md mx-auto text-white py-5 rounded-[1.8rem] font-extrabold text-lg active:scale-95 transition-all">Selesai & Hitung →</button>
            </div>
        </div>

        <!-- STEP 4: RESULT -->
        <div id="step-4" class="hidden step-in space-y-6">
            <div class="btn-premium rounded-[2.5rem] p-10 text-white text-center shadow-2xl relative overflow-hidden">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-80 mb-1">Tagihan Dibayar</p>
                <h3 id="grand-total-text" class="text-4xl font-black">Rp 0</h3>
                <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            </div>
            <div id="summary-list" class="space-y-4"></div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="downloadPDF()" class="bg-white border border-slate-100 p-5 rounded-[1.8rem] font-extrabold text-xs shadow-sm active:scale-95 transition-all flex flex-col items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    SIMPAN PDF
                </button>
                <button onclick="location.reload()" class="bg-indigo-50 p-5 rounded-[1.8rem] font-extrabold text-xs text-indigo-600 active:scale-95 transition-all">ULANGI</button>
            </div>
        </div>

    </main>

    <!-- LOADER -->
    <div id="loader" class="hidden fixed inset-0 glass z-[60] flex flex-col items-center justify-center p-10 text-center">
        <div class="relative mb-8">
            <div class="w-20 h-20 border-4 border-slate-100 rounded-3xl animate-spin shadow-xl"></div>
            <div class="w-10 h-10 btn-premium absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-xl flex items-center justify-center text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="animate-pulse"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
        </div>
        <h3 class="text-2xl font-extrabold text-slate-800 tracking-tight">Gauri Membaca Struk...</h3>
        <p class="text-slate-400 text-sm mt-3 font-medium px-4">Menggunakan AI 2.5 Flash untuk analisis super akurat. Mohon tunggu 5-10 detik.</p>
    </div>

    <script>
        const apiKey = "AIzaSyBUCxSsZau7u16hxl_0_3DpN3-y0Gf24I0";
        let items = []; let people = []; let assignments = {}; let tax = 0;

        function cleanJSON(text) {
            try {
                const start = text.indexOf('{');
                const end = text.lastIndexOf('}');
                if (start === -1 || end === -1) return null;
                return JSON.parse(text.substring(start, end + 1));
            } catch (e) { return null; }
        }

        async function callAI(base64, retry = 0) {
            const prompt = `Analisis struk ini dengan sangat teliti. Ekstrak menu, jumlah (qty), dan harga TOTAL baris tersebut. Format struk biasanya: [Qty] [Nama Menu] [Harga Total]. Contoh: "3 CHICKEN STEAK 172,500" artinya qty=3, total=172500. Kembalikan HANYA JSON: { "items": [{"name":"Menu Name", "price": 100000, "qty": 1}], "totalTax": 5000 }. Hilangkan simbol Rp, titik, dan koma dari angka.`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("API Error");
                const data = await response.json();
                const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!rawText) throw new Error("No text returned");
                
                return cleanJSON(rawText);
            } catch (err) {
                if (retry < 1) return callAI(base64, retry + 1);
                throw err;
            }
        }

        async function handleFile(input) {
            const file = input.files[0]; if (!file) return;
            document.getElementById('loader').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                try {
                    const res = await callAI(base64);
                    if (!res || !res.items) throw new Error("Parsing failed");
                    
                    items = res.items.map(it => {
                        const qty = parseInt(it.qty) || 1;
                        const totalPrice = parseInt(it.price.toString().replace(/\D/g, '')) || 0;
                        // Gauri menghitung unit price (harga satu porsi) otomatis
                        const unitPrice = Math.round(totalPrice / qty);
                        return { 
                            id: Math.random().toString(36).substr(2, 9),
                            name: it.name,
                            price: unitPrice,
                            qty: qty
                        };
                    });
                    tax = parseInt(res.totalTax?.toString().replace(/\D/g, '')) || 0;
                    renderStep2(); goToStep(2);
                } catch (err) {
                    alert("Gauri gagal membaca otomatis. Foto mungkin kurang cahaya atau format struk terlalu unik. Silakan coba lagi atau gunakan input manual.");
                } finally { document.getElementById('loader').classList.add('hidden'); }
            };
            reader.readAsDataURL(file);
        }

        function startManual() { items = []; renderStep2(); goToStep(2); }
        function addItem() { items.push({ id: Math.random().toString(36).substr(2, 9), name: "Menu Baru", price: 0, qty: 1 }); renderStep2(); }

        function renderStep2() {
            const list = document.getElementById('items-list');
            list.innerHTML = items.map((it, i) => `
                <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-50 space-y-4 animate-up">
                    <div class="flex justify-between items-start gap-3">
                        <div class="flex-1">
                            <input type="text" value="${it.name}" onchange="items[${i}].name=this.value" class="font-extrabold text-slate-800 text-lg w-full bg-transparent outline-none focus:text-indigo-600">
                            <div class="flex gap-2 mt-3">
                                <div class="bg-slate-50 px-3 py-2 rounded-xl flex gap-2 items-center">
                                    <span class="text-[9px] font-black text-slate-300">QTY</span>
                                    <input type="number" value="${it.qty}" onchange="items[${i}].qty=parseInt(this.value); renderStep2();" class="w-8 text-center bg-transparent font-bold">
                                </div>
                                <div class="bg-slate-50 px-3 py-2 rounded-xl flex gap-2 items-center">
                                    <span class="text-[9px] font-black text-slate-300">@ RP</span>
                                    <input type="number" value="${it.price}" onchange="items[${i}].price=parseInt(this.value); renderStep2();" class="w-20 bg-transparent font-bold">
                                </div>
                            </div>
                        </div>
                        <button onclick="items.splice(${i},1); renderStep2();" class="w-8 h-8 rounded-full flex items-center justify-center text-red-200 hover:text-red-500 transition-all">×</button>
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-slate-50">
                        <span class="text-[9px] font-black text-slate-300 tracking-wider">TOTAL BARIS</span>
                        <span class="font-black text-indigo-600">Rp ${(it.price * it.qty).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('tax-input').value = tax;
        }

        function goToStep(n) {
            [1, 2, 3, 4].forEach(s => document.getElementById(`step-${s}`).classList.add('hidden'));
            document.getElementById(`step-${n}`).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (n === 3) renderAssign();
            if (n === 4) renderSummary();
        }

        function addPerson() {
            const input = document.getElementById('person-input');
            if (input.value.trim()) {
                people.push({ id: Date.now().toString(), name: input.value.trim() });
                input.value = ''; renderNames(); renderAssign();
            }
        }

        function renderNames() {
            const cont = document.getElementById('people-chips');
            cont.innerHTML = people.map(p => `
                <div class="bg-white border border-slate-100 pl-4 pr-2 py-2 rounded-2xl text-[10px] font-black flex items-center gap-3 shadow-sm animate-up">
                    <span class="uppercase tracking-tight">${p.name}</span>
                    <button onclick="people=people.filter(x=>x.id!=='${p.id}'); renderNames(); renderAssign();" class="w-6 h-6 bg-slate-50 rounded-lg text-slate-300 hover:text-red-500 transition-all">×</button>
                </div>
            `).join('');
        }

        function updateQty(itId, pId, delta) {
            if (!assignments[itId]) assignments[itId] = {};
            const cur = assignments[itId][pId] || 0;
            assignments[itId][pId] = Math.max(0, cur + delta);
            renderAssign();
        }

        function renderAssign() {
            const cont = document.getElementById('assign-container');
            if (people.length === 0) { cont.innerHTML = `<div class="py-20 text-center text-slate-300 font-bold italic px-8">Ketik nama teman di atas satu per satu ya!</div>`; return; }
            cont.innerHTML = items.map(it => `
                <div class="bg-white rounded-[2.5rem] p-7 shadow-sm border border-slate-50 space-y-5">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-4">
                        <div class="space-y-0.5">
                            <span class="font-extrabold text-sm text-slate-800 block">${it.name}</span>
                            <span class="font-black text-indigo-500 text-[10px] bg-indigo-50 px-2 py-0.5 rounded-lg">Rp ${it.price.toLocaleString()} / pcs</span>
                        </div>
                        <span class="font-black text-slate-200 text-xs">Total: ${it.qty}</span>
                    </div>
                    <div class="space-y-2">
                        ${people.map(p => {
                            const q = assignments[it.id]?.[p.id] || 0;
                            return `
                                <div class="flex justify-between items-center p-3 rounded-2xl ${q > 0 ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'} transition-all duration-300">
                                    <span class="text-xs font-black ml-2 uppercase">${p.name}</span>
                                    <div class="flex items-center gap-4">
                                        <button onclick="updateQty('${it.id}', '${p.id}', -1)" class="w-9 h-9 ${q > 0 ? 'bg-white/20' : 'bg-white'} rounded-xl flex items-center justify-center font-bold shadow-sm">-</button>
                                        <span class="text-sm font-black w-3 text-center">${q}</span>
                                        <button onclick="updateQty('${it.id}', '${p.id}', 1)" class="w-9 h-9 ${q > 0 ? 'bg-white/20' : 'bg-white'} rounded-xl flex items-center justify-center font-bold shadow-sm">+</button>
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function calculate() {
            tax = parseInt(document.getElementById('tax-input').value) || 0;
            const sub = items.reduce((a, b) => a + (b.price * b.qty), 0);
            const totals = people.map(p => {
                let pSub = 0;
                items.forEach(it => { const q = assignments[it.id]?.[p.id] || 0; pSub += (it.price * q); });
                const pTax = sub > 0 ? (pSub / sub) * tax : 0;
                return { ...p, sub: pSub, pTax, total: pSub + pTax };
            });
            return { sub, tax, grand: sub + tax, totals };
        }

        function renderSummary() {
            const data = calculate();
            document.getElementById('grand-total-text').innerText = `Rp ${data.grand.toLocaleString()}`;
            document.getElementById('summary-list').innerHTML = data.totals.map(p => `
                <div class="bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-sm relative overflow-hidden animate-up">
                    <div class="flex justify-between items-start mb-6">
                        <div class="space-y-1">
                            <h4 class="text-2xl font-black text-slate-800 uppercase tracking-tight">${p.name}</h4>
                            <p class="text-[9px] font-black text-indigo-500 uppercase tracking-[0.2em] opacity-80">Rincian Bill</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[8px] font-black text-slate-300 uppercase block mb-1">TOTAL BAYAR</span>
                            <span class="font-black text-2xl text-indigo-600">Rp ${Math.round(p.total).toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="space-y-2.5">
                        ${items.filter(it => (assignments[it.id]?.[p.id] || 0) > 0).map(it => `
                            <div class="flex justify-between text-xs text-slate-500 font-medium">
                                <span class="italic">${it.name} <span class="text-slate-300 ml-1">x${assignments[it.id][p.id]}</span></span>
                                <span class="font-black text-slate-800">Rp ${(it.price * assignments[it.id][p.id]).toLocaleString()}</span>
                            </div>
                        `).join('')}
                        <div class="pt-4 mt-2 border-t border-slate-50 flex justify-between text-[9px] font-black text-slate-300 uppercase tracking-widest">
                            <span>Bagian Pajak</span>
                            <span>+ Rp ${Math.round(p.pTax).toLocaleString()}</span>
                        </div>
                    </div>
                </div>`).join('');
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const data = calculate();
            doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.text("GAURI BILL SUMMARY", 14, 25);
            doc.setFontSize(10); doc.setTextColor(150); doc.text(`Laporan dibuat pada: ${new Date().toLocaleString('id-ID')}`, 14, 32);
            doc.setFontSize(14); doc.setTextColor(0); doc.text(`TOTAL KESELURUHAN: Rp ${data.grand.toLocaleString()}`, 14, 45);
            let y = 60;
            data.totals.forEach(p => {
                if (y > 240) { doc.addPage(); y = 20; }
                doc.setFontSize(16); doc.setTextColor(79, 70, 229); doc.text(p.name, 14, y);
                const rows = items.filter(it => (assignments[it.id]?.[p.id] || 0) > 0).map(it => [it.name, assignments[it.id][p.id], `Rp ${it.price.toLocaleString()}`, `Rp ${(it.price * assignments[it.id][p.id]).toLocaleString()}`]);
                doc.autoTable({ startY: y + 3, head: [['Menu', 'Qty', 'Satuan', 'Total']], body: [...rows, [{ content: 'TOTAL HARUS DIBAYAR', colSpan: 3, styles: { halign: 'right', fontStyle: 'bold' } }, `Rp ${Math.round(p.total).toLocaleString()}`]], theme: 'striped', headStyles: { fillColor: [79, 70, 229] } });
                y = doc.lastAutoTable.finalY + 15;
            });
            doc.save(`Tagihan_Gauri_${Date.now()}.pdf`);
        }
    </script>
</body>
</html>
